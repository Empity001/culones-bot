<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>culones-rpg · Vista de imagen</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0c0a14;
    font-family: 'Space Grotesk', Arial, sans-serif;
  }
  .bar {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 12px 18px;
    background: rgba(21,17,31,0.92);
    border-bottom: 1px solid rgba(243,183,58,0.25);
    backdrop-filter: blur(6px);
    z-index: 10;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1c1730;
    border: 1px solid rgba(243,183,58,0.45);
    color: #f4f1fb;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
  }
  .back-btn:hover { border-color: #f3b73a; color: #f3b73a; }
  .asset-title {
    color: #9a92b8;
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stage {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 84px 16px 24px;
  }
  .stage img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  .error-msg {
    color: #ff3d8e;
    font-size: 14px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="bar">
    <button class="back-btn" id="back-btn">← Volver</button>
    <span class="asset-title" id="asset-title"></span>
  </div>
  <div class="stage" id="stage">
    <p class="error-msg" id="error-msg" style="display:none;">No se pudo cargar la imagen.</p>
    <img id="asset-img" alt="Vista completa" style="display:none;" />
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const src = params.get('src') || '';
    const title = params.get('title') || '';

    document.getElementById('asset-title').textContent = title;

    const img = document.getElementById('asset-img');
    const errorMsg = document.getElementById('error-msg');

    if (src) {
      img.src = src;
      img.style.display = 'block';
      img.onerror = () => {
        img.style.display = 'none';
        errorMsg.style.display = 'block';
      };
    } else {
      errorMsg.textContent = 'No se especificó ninguna imagen.';
      errorMsg.style.display = 'block';
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      // Esta pestaña se abrió desde el sitio principal con un botón
      // de "ver en pantalla completa" — al volver, simplemente
      // cerramos esta pestaña y el usuario regresa a la pestaña
      // original. Si el navegador no permite cerrarla (porque no
      // fue abierta por script, p. ej. el usuario la abrió manual),
      // probamos history.back() como respaldo.
      window.close();
      setTimeout(() => { if (!window.closed) history.back(); }, 150);
    });
  </script>
</body>
</html>
